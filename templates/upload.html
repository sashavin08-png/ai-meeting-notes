{% extends "base.html" %}
{% block title %}Upload a recording — AI Meeting Notes{% endblock %}
{% block content %}
  <div class="eyebrow"><a href="{{ url_for('meetings_list') }}">&larr; Your meetings</a></div>
  <h1>Upload a recording</h1>

  <form method="POST" enctype="multipart/form-data">
    <label for="title">Meeting title (optional)</label>
    <input type="text" id="title" name="title" placeholder="e.g. Client kickoff call">

    <label for="audio_file">Audio file</label>
    <input type="file" id="audio_file" name="audio_file" accept="audio/*,video/mp4" required>

    <button type="submit" class="btn">Upload &amp; process</button>
  </form>

  <div class="card-meta" style="margin-top: 12px;">
    Supported: mp3, wav, m4a, mp4, webm, ogg. Processing happens right after upload — larger files take longer.
  </div>
{% endblock %}
